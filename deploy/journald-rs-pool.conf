# Journald limits for the pool Pi (small SD card).
# Installed to /etc/systemd/journald.conf.d/99-rs-pool.conf
# Apply with: sudo systemctl restart systemd-journald

[Journal]
Storage=persistent
Compress=yes
SystemMaxUse=64M
SystemKeepFree=128M
RuntimeMaxUse=32M
MaxRetentionSec=14day
MaxFileSec=1day
